# Gen-5 mutation: Enable full CPU-native codegen for AVX2/FMA/AVX-512 auto-vectorization.
# - target-cpu=native lets LLVM detect and use all available SIMD extensions (AVX2, FMA, AVX-512, etc.)
# - lto=fat enables aggressive cross-crate inlining and constant propagation
# - codegen-units=1 prevents splitting the hot IDCT loop across translation units
[target.'cfg(all())']
rustflags = ["-C", "target-cpu=native"]
