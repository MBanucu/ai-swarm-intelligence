# Enable FMA + SSE4.2 + AVX for fast double-precision math.
# AVX on 256-bit (YMM) registers provides 2× throughput for f64 ops.
# FMA fused multiply-add halves instruction count for inner products.
# SSE4.2 enables fast CRC and other SIMD convenience ops.
[target.'cfg(all())']
rustflags = ["-C", "target-feature=+avx,+fma,+sse4.2"]
