# Enable native CPU features for maximum performance:
# AVX, AVX2, FMA, SSE4.2, and any other features the host CPU supports.
# `target-cpu=native` lets LLVM emit aligned AVX loads, FMA instructions,
# and auto-vectorize the IDCT scalar loops optimally.
[target.'cfg(all())']
rustflags = ["-C", "target-cpu=native"]
